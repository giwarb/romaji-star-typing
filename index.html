<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Deterministic HTML game template with AI-friendly Playwright harness."
    />
    <title>Pulse Runner</title>
  </head>
  <body>
    <main id="app" aria-label="Pulse Runner game">
      <section class="game-shell">
        <header class="topbar">
          <div>
            <p class="eyebrow">HTML Game AI Harness</p>
            <h1>Pulse Runner</h1>
          </div>
          <div class="stats" aria-label="Game status">
            <span data-testid="level-label">Level 1</span>
            <span data-testid="move-label">Moves 0</span>
            <span data-testid="best-label">Best -</span>
          </div>
        </header>

        <section class="board-wrap" aria-label="Game board">
          <div id="board" class="board" data-testid="board"></div>
        </section>

        <footer class="controls">
          <button type="button" data-action="reset" data-testid="reset-button">Reset</button>
          <button type="button" data-action="next" data-testid="next-button">Next</button>
          <button type="button" data-action="seed" data-testid="seed-button">Seeded Run</button>
        </footer>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
