<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="小学3年生向けのローマ字タイピング練習ゲーム。"
    />
    <title>ローマ字スタータイピング</title>
  </head>
  <body>
    <main id="app" aria-label="ローマ字スタータイピング">
      <section class="game-shell">
        <header class="topbar">
          <div>
            <p class="eyebrow">Romaji Typing Garden</p>
            <h1>ローマ字スタータイピング</h1>
          </div>
          <div class="stats" aria-label="スコア">
            <span>Score <strong data-testid="score-label">0</strong></span>
            <span>Combo <strong data-testid="streak-label">0</strong></span>
            <span>Miss <strong data-testid="mistake-label">0</strong></span>
          </div>
        </header>

        <nav class="stage-rail" data-testid="stage-rail" aria-label="ステージ"></nav>

        <section class="progress-area" aria-label="進みぐあい">
          <div>
            <span>ステージ</span>
            <div class="meter"><span data-testid="stage-progress"></span></div>
          </div>
          <div>
            <span>ぜんたい</span>
            <div class="meter course"><span data-testid="course-progress"></span></div>
          </div>
        </section>

        <section class="lesson-panel">
          <div class="stage-info">
            <span class="badge" data-testid="stage-badge">Seed</span>
            <div>
              <h2 data-testid="stage-title">ステージ</h2>
              <p data-testid="stage-description">説明</p>
            </div>
          </div>

          <section class="kana-card" data-testid="kana-card">
            <p class="prompt-label">このひらがなをローマ字で打とう</p>
            <div class="kana" data-testid="kana-text">あ</div>
            <div class="romaji" data-testid="romaji-target" aria-label="ローマ字"></div>
            <p class="hint" data-testid="hint-text"></p>
          </section>

          <p class="message" data-testid="message" aria-live="polite"></p>

          <section class="keyboard-wrap" aria-label="キーボード">
            <div class="keyboard-help">
              <span><i class="dot next-dot"></i>つぎ</span>
              <span><i class="dot correct-dot"></i>せいかい</span>
              <span><i class="dot wrong-dot"></i>おしたキー</span>
            </div>
            <div class="keyboard" data-testid="keyboard"></div>
          </section>
        </section>

        <footer class="controls">
          <button type="button" data-testid="next-button">つぎの問題</button>
          <button type="button" data-testid="reset-button">リセット</button>
        </footer>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
